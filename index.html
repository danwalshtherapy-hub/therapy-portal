<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Therapy Portal Login</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Inter", Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      /* Calming beach background */
      background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1950&q=80');
      background-size: cover;
      background-position: center;
      position: relative;
    }

    /* Dark overlay */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(2px);
    }

    /* Login card */
    .card {
      position: relative;
      background: rgba(255, 255, 255, 0.15);
      padding: 40px;
      border-radius: 16px;
      width: 320px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      animation: fadeIn 0.8s ease;
      color: white;
      text-align: center; /* Center everything */
    }

    h2 {
      margin-top: 0;
      font-weight: 600;
    }

    /* Input + button alignment fix */
    input, button {
      width: 100%;
      box-sizing: border-box; /* Ensures equal width */
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
      margin: 12px 0; /* Consistent spacing */
    }

    button {
      background: #4CAF50;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #45a049;
    }

    #message {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>Welcome Back</h2>
    <p style="opacity:0.8;">Sign in to continue</p>

    <input id="email" type="email" placeholder="Email address" />
    <button onclick="login()">Send Login Link</button>

    <div id="message"></div>
  </div>

  <script>
    const supabase = supabase.createClient(
      "https://crdfeaktmahbzwlontup.supabase.co",
      "sb_publishable_cjevTmosz1gAE_zXRt81CQ_Laq35vIZ"
    );

    const THERAPIST_EMAIL = "therapist@example.com";

    async function login() {
      const email = document.getElementById("email").value;
      const msg = document.getElementById("message");

      msg.innerHTML = "Sending magic link...";

      const { error } = await supabase.auth.signInWithOtp({ email });

      if (error) {
        msg.innerHTML = "<span style='color:#ffb3b3'>" + error.message + "</span>";
      } else {
        msg.innerHTML = "<span style='color:#b3ffb3'>Check your email for the login link.</span>";
      }
    }

    supabase.auth.onAuthStateChange(async (event, session) => {
      if (session) {
        const email = session.user.email;

        if (email === THERAPIST_EMAIL) {
          window.location.href = "therapist.html";
        } else {
          window.location.href = "patient.html";
        }
      }
    });
  </script>

</body>
</html>
    );
