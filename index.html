<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Therapy Portal Login</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Inter", Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      /* Calming beach background */
      background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1950&q=80');
      background-size: cover;
      background-position: center;
      position: relative;
    }

    /* Dark overlay */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(2px);
    }

    /* Login card */
    .card {
      position: relative;
      background: rgba(255, 255, 255, 0.15);
      padding: 40px;
      border-radius: 16px;
      width: 320px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      animation: fadeIn 0.8s ease;
      color: white;
      text-align: center; /* Center everything */
    }

    h2 {
      margin-top: 0;
      font-weight: 600;
    }

    input {
      width: 100%;
      max-width: 240px;   /* ← change this number to adjust input width */
      box-sizing: border-box;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
      margin: 12px auto;
      display: block;
    }
    
    button {
      width: 100%;
      max-width: 260px;   /* ← button can be wider or same as input */
      box-sizing: border-box;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      margin: 12px auto;
      display: block;
      background: #4CAF50;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }
      
    button:hover {
      background: #45a049;
    }

    #message {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>Welcome Back</h2>
    <p style="opacity:0.8;">Sign in to continue</p>

    <input id="email" type="email" placeholder="Email address" />
    <button onclick="login()">Send Login Link</button>

    <div id="message"></div>
  </div>

  <script>
    const { createClient } = supabase;
    const supabaseClient = createClient(
      "https://crdfeaktmahbzwlontup.supabase.co",
      "sb_publishable_cjevTmosz1gAE_zXRt81CQ_Laq35vIZ"
    );

    const THERAPIST_EMAIL = "johnrobertcarrahar@gmail.com";

    async function login() {
      const email = document.getElementById("email").value.trim();
      const msg = document.getElementById("message");

      if (!email) {
        msg.innerHTML = "<span style='color:#ffb3b3'>Please enter your email address.</span>";
        return;
      }

      msg.innerHTML = "Sending magic link...";

      const { error } = await supabaseClient.auth.signInWithOtp({ email });

      if (error) {
        msg.innerHTML = "<span style='color:#ffb3b3'>" + error.message + "</span>";
      } else {
        msg.innerHTML = "<span style='color:#b3ffb3'>Check your email for the login link.</span>";
      }
    }

    supabaseClient.auth.onAuthStateChange(async (event, session) => {
      if (!session) return;

      const email = session.user.email;

      // Therapist goes straight to their dashboard
      if (email === THERAPIST_EMAIL) {
        window.location.href = "therapist-dashboard.html";
        return;
      }

      // For patients: check whether they have a payment on record
      // If yes → patient dashboard. If no → onboarding wizard.
      const { data: payments, error } = await supabaseClient
        .from("payments")
        .select("id")
        .eq("patient_id", session.user.id)   // TODO: join via patients.auth_user_id if needed
        .limit(1);

      if (error) {
        console.error("Payment check failed:", error.message);
        // Fail open to onboarding so the patient isn't stuck
        window.location.href = "onboarding.html";
        return;
      }

      if (payments && payments.length > 0) {
        window.location.href = "patient-dashboard.html";
      } else {
        window.location.href = "onboarding.html";
      }
    });
  </script>

</body>
</html>
    );
